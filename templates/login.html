<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Valedourado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #eef2f5; /* Fundo cinza bem suave para o site todo */
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* 1. TRUQUE DO LOGÓTIPO SEM FUNDO NO CANTO ESQUERDO */
        .logo-empresa {
            max-width: 220px;
            mix-blend-mode: multiply; /* Faz o fundo branco do JPG desaparecer! */
            position: absolute; /* Fixa o logo no canto superior esquerdo */
            top: 15px;
            left: 25px;
        }

        /* 2. LIMITAR A LARGURA PARA NÃO FICAR ESTICADO FEIO */
        .main-container {
            max-width: 850px;
            margin: 100px auto 40px; /* Dá espaço no topo e centraliza o resto */
        }

        .top-warning {
            text-align: center;
            margin-bottom: 25px;
        }

        /* 3. ABAS (Estilo SIGAA) */
        .tabs-container {
            display: flex;
            width: 100%;
        }
        
        .tab-btn {
            flex: 1;
            text-align: center;
            padding: 15px;
            background-color: #f1f3f5; /* Cinza das abas inativas */
            border: 1px solid #dee2e6;
            cursor: pointer;
            color: #333;
            transition: 0.2s;
            margin: 0;
        }

        .btn-check:checked + .tab-btn {
            background-color: #fff9c4 !important; /* Amarelinho do SIGAA */
            border-bottom: 1px solid #fff9c4; /* Tira a linha de baixo para juntar com a caixa */
            border-top: 3px solid #ff8c00; /* Detalhe laranja da marca em cima */
        }

        /* 4. CAIXA DE LOGIN GERAL */
        .login-box {
            background-color: #ffffff;
            border: 1px solid #dee2e6;
            border-top: none; /* Cola na aba selecionada */
            padding: 40px 20px;
        }

        /* 5. CAIXINHA INTERNA COM OS CAMPOS (Igual à imagem) */
        .login-inner {
            max-width: 420px;
            margin: 0 auto;
            background-color: #fafbfc;
            border: 1px solid #cdd4db;
            padding-bottom: 20px;
        }

        /* Cabecalho azulzinho da caixinha interna */
        .login-inner-header {
            background-color: #dbe4f0;
            color: #003366;
            font-weight: bold;
            padding: 5px 15px;
            border-bottom: 1px solid #cdd4db;
            margin-bottom: 25px;
            text-align: left;
        }
    </style>
</head>
<body>

    <!-- LOGÓTIPO -->
    <img src="{{ url_for('static', filename='images.png') }}" alt="Logo Valedourado" class="logo-empresa">

    <div class="main-container">
        
        <!-- AVISO -->
        <div class="top-warning">
            <strong class="text-danger fs-5">ATENÇÃO!</strong><br>
            <span class="text-secondary">Selecione o módulo que deseja acessar antes de inserir suas credenciais.</span>
        </div>

        <form action="/login" method="POST">
            
            <!-- ABAS -->
            <div class="tabs-container">
                <input type="radio" class="btn-check" name="modulo" id="mod-func" autocomplete="off" value="funcionario" checked>
                <label class="tab-btn" for="mod-func">
                    <strong style="color: #004085; font-size: 1.2rem;">Produção</strong><br>
                    <span style="font-size: 0.9rem;">(Funcionário)</span>
                </label>

                <input type="radio" class="btn-check" name="modulo" id="mod-admin" autocomplete="off" value="admin">
                <label class="tab-btn" for="mod-admin">
                    <strong style="color: #004085; font-size: 1.2rem;">Gestão</strong><br>
                    <span style="font-size: 0.9rem;">(Administrativo)</span>
                </label>
            </div>

            <!-- ÁREA BRANCA INFERIOR -->
            <div class="login-box">
                
                <!-- CAIXINHA DE CAMPOS IDÊNTICA AO SISTEMA DO GOVERNO -->
                <div class="login-inner text-center">
                    
                    <div class="login-inner-header">
                        Entrar no Sistema
                    </div>

                    {% if mensagem_erro %}
                        <div class="alert alert-danger py-1 mx-3 mb-3" style="font-size: 0.9rem;" role="alert">
                            {{ mensagem_erro }}
                        </div>
                    {% endif %}

                    <div class="mb-3 d-flex align-items-center justify-content-center">
                        <label for="username" class="me-2" style="width: 70px; text-align: right; color: #333;">Usuário:</label>
                        <input type="text" class="form-control form-control-sm border-secondary" id="username" name="username" style="width: 200px; border-radius: 0;" required>
                    </div>

                    <div class="mb-4 d-flex align-items-center justify-content-center">
                        <label for="password" class="me-2" style="width: 70px; text-align: right; color: #333;">Senha:</label>
                        <input type="password" class="form-control form-control-sm border-secondary" id="password" name="password" style="width: 200px; border-radius: 0;" required>
                    </div>

                    <button type="submit" class="btn btn-light btn-sm border border-secondary px-4 py-1" style="background-color: #f4f4f4;">
                        Entrar
                    </button>
                </div>

            </div>

        </form>
    </div>

</body>
</html>
