<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Valedourado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Área do Logótipo a ocupar toda a largura */
        .header-logo {
            background-color: #ffffff;
            padding: 20px 0;
            text-align: center;
        }
        .logo-empresa {
            max-width: 250px;
        }

        /* Barra de Aviso Vermelho */
        .top-warning {
            background-color: #f1f3f5;
            padding: 15px 0;
            text-align: center;
            border-bottom: 1px solid #dee2e6;
            border-top: 1px solid #dee2e6;
        }

        /* Contentor das Abas (Ecrã Inteiro) */
        .tabs-container {
            display: flex;
            width: 100%;
            background-color: #ffffff;
            border-bottom: 2px solid #dee2e6;
        }
        
        .tab-btn {
            flex: 1; /* Faz cada aba ocupar 50% do ecrã */
            text-align: center;
            padding: 15px;
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            cursor: pointer;
            font-size: 1.1rem;
            color: #333;
            transition: 0.3s;
            margin: 0;
        }

        /* Estilo quando a aba é selecionada (Amarelo/Laranja) */
        .btn-check:checked + .tab-btn {
            background-color: #fff9c4 !important; /* Fundo amarelo claro tipo SIPAC */
            border-bottom: 4px solid #ff8c00; /* Linha laranja por baixo */
        }

        /* Caixa onde se digita o Utilizador e Senha */
        .login-box {
            background-color: #fff;
            border: 1px solid #ced4da;
            width: 100%;
            max-width: 450px;
            margin: 40px auto;
            padding: 30px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <div class="header-logo">
        <img src="{{ url_for('static', filename='images.jpg') }}" alt="Logo Valedourado" class="logo-empresa">
    </div>

    <div class="top-warning">
        <strong class="text-danger">ATENÇÃO!</strong><br>
        <span class="text-muted">Selecione o módulo que deseja aceder antes de inserir as suas credenciais.</span>
    </div>

    <form action="/login" method="POST">
        
        <div class="tabs-container">
            <input type="radio" class="btn-check" name="modulo" id="mod-func" autocomplete="off" value="funcionario" checked>
            <label class="tab-btn" for="mod-func">
                <strong style="color: #0056b3; font-size: 1.2rem;">Produção</strong><br>
                <span style="font-size: 0.9rem;">(Funcionário)</span>
            </label>

            <input type="radio" class="btn-check" name="modulo" id="mod-admin" autocomplete="off" value="admin">
            <label class="tab-btn" for="mod-admin">
                <strong style="color: #0056b3; font-size: 1.2rem;">Gestão</strong><br>
                <span style="font-size: 0.9rem;">(Administrativo)</span>
            </label>
        </div>

        <div class="login-box text-center">
            
            {% if mensagem_erro %}
                <div class="alert alert-danger py-2 mb-4" role="alert">
                    {{ mensagem_erro }}
                </div>
            {% endif %}

            <div class="mb-3 d-flex align-items-center justify-content-center">
                <label for="username" class="fw-bold me-2" style="width: 80px; text-align: right;">Usuário:</label>
                <input type="text" class="form-control" id="username" name="username" style="width: 200px;" required>
            </div>

            <div class="mb-4 d-flex align-items-center justify-content-center">
                <label for="password" class="fw-bold me-2" style="width: 80px; text-align: right;">Senha:</label>
                <input type="password" class="form-control" id="password" name="password" style="width: 200px;" required>
            </div>

            <button type="submit" class="btn btn-success fw-bold px-4 py-2" style="background-color: #00994d; border: none; border-radius: 5px;">
                Entrar no Sistema
            </button>
        </div>

    </form>

</body>
</html>
