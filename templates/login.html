<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Valedourado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            
            /* IMAGEM DE FUNDO COM PELÍCULA BRANCA SEMI-TRANSPARENTE */
            /* O rgba(255,255,255,0.7) aplica 70% de branco por cima da foto para não ofuscar o login */
            background-image: linear-gradient(rgba(255, 255, 255, 0.75), rgba(255, 255, 255, 0.75)), 
                              url("{{ url_for('static', filename='fabrica.png') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* 1. LOGÓTIPO NO CANTO SUPERIOR ESQUERDO SEM FUNDO */
        .logo-empresa {
            max-width: 220px;
            mix-blend-mode: multiply; /* Retira o fundo branco do JPG */
            position: absolute; 
            top: 15px;
            left: 25px;
        }

        /* 2. LIMITAR A LARGURA DA CAIXA CENTRAL */
        .main-container {
            max-width: 850px;
            margin: 120px auto 40px; /* Espaço no topo para não chocar com o logótipo */
            /* Adiciona uma sombra suave à volta de tudo para destacar do fundo fotográfico */
            box-shadow: 0px 8px 25px rgba(0, 0, 0, 0.15);
            border-radius: 8px;
            overflow: hidden; /* Mantém os cantos arredondados limpos */
        }

        .top-warning {
            text-align: center;
            padding: 20px;
            background-color: #ffffff;
            border-bottom: 1px solid #dee2e6;
        }

        /* 3. ABAS (Estilo SIGAA) */
        .tabs-container {
            display: flex;
            width: 100%;
        }
        
        .tab-btn {
            flex: 1;
            text-align: center;
            padding: 15px;
            background-color: #f8f9fa; /* Cinza bem claro das abas inativas */
            border-right: 1px solid #dee2e6;
            cursor: pointer;
            color: #333;
            transition: 0.2s;
            margin: 0;
        }
        
        .tab-btn:last-child {
            border-right: none;
        }

        .btn-check:checked + .tab-btn {
            background-color: #fff9c4 !important; /* Amarelinho do SIGAA */
            border-bottom: none; 
            border-top: 4px solid #ff8c00; /* Linha Laranja da marca em cima */
        }

        /* 4. CAIXA DE LOGIN GERAL */
        .login-box {
            background-color: #ffffff;
            padding: 40px 20px;
        }

        /* 5. CAIXINHA INTERNA COM OS CAMPOS */
        .login-inner {
            max-width: 420px;
            margin: 0 auto;
            background-color: #fafbfc;
            border: 1px solid #cdd4db;
            padding-bottom: 25px;
            border-radius: 4px;
        }

        /* Cabeçalho da caixinha interna */
        .login-inner-header {
            background-color: #dbe4f0;
            color: #003366;
            font-weight: bold;
            padding: 8px 15px;
            border-bottom: 1px solid #cdd4db;
            margin-bottom: 25px;
            text-align: left;
            border-top-left-radius: 4px;
            border-top-right-radius: 4px;
        }
    </style>
</head>
<body>

    <img src="{{ url_for('static', filename='images.png') }}" alt="Logo Valedourado" class="logo-empresa">

    <div class="main-container">
        
        <div class="top-warning">
            <strong class="text-danger fs-5">ATENÇÃO!</strong><br>
            <span class="text-secondary">Selecione o módulo que deseja aceder antes de inserir as suas credenciais.</span>
        </div>

        <form action="/login" method="POST" style="margin: 0;">
            
            <div class="tabs-container">
                <input type="radio" class="btn-check" name="modulo" id="mod-func" autocomplete="off" value="funcionario" checked>
                <label class="tab-btn" for="mod-func">
                    <strong style="color: #004085; font-size: 1.2rem;">Produção</strong><br>
                    <span style="font-size: 0.9rem;">(Funcionário)</span>
                </label>

                <input type="radio" class="btn-check" name="modulo" id="mod-admin" autocomplete="off" value="admin">
                <label class="tab-btn" for="mod-admin">
                    <strong style="color: #004085; font-size: 1.2rem;">Gestão</strong><br>
                    <span style="font-size: 0.9rem;">(Administrativo)</span>
                </label>
            </div>

            <div class="login-box">
                
                <div class="login-inner text-center shadow-sm">
                    
                    <div class="login-inner-header">
                        Entrar no Sistema
                    </div>

                    {% if mensagem_erro %}
                        <div class="alert alert-danger py-1 mx-3 mb-3" style="font-size: 0.9rem;" role="alert">
                            {{ mensagem_erro }}
                        </div>
                    {% endif %}

                    <div class="mb-3 d-flex align-items-center justify-content-center px-3">
                        <label for="username" class="me-2 fw-bold" style="width: 80px; text-align: right; color: #444;">Usuário:</label>
                        <input type="text" class="form-control form-control-sm border-secondary" id="username" name="username" style="width: 200px; border-radius: 2px;" required>
                    </div>

                    <div class="mb-4 d-flex align-items-center justify-content-center px-3">
                        <label for="password" class="me-2 fw-bold" style="width: 80px; text-align: right; color: #444;">Senha:</label>
                        <input type="password" class="form-control form-control-sm border-secondary" id="password" name="password" style="width: 200px; border-radius: 2px;" required>
                    </div>

                    <button type="submit" class="btn btn-light btn-sm border border-secondary px-4 py-1 fw-bold" style="background-color: #f4f4f4; color: #333;">
                        Entrar
                    </button>
                </div>

            </div>

        </form>
    </div>

</body>
</html>
