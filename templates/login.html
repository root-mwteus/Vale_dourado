<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Laticínios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center justify-content-center" style="min-height: 100vh; margin: 0;">

    <div class="card shadow" style="width: 100%; max-width: 420px; border-radius: 12px;">
        <div class="card-body p-4">
            
            <h3 class="card-title text-start mb-4 text-primary fw-bold">Acesso ao Sistema</h3>

            {% if mensagem_erro %}
                <div class="alert alert-danger text-center" role="alert">
                    {{ mensagem_erro }}
                </div>
            {% endif %}

            <form action="/login" method="POST">
                <div class="mb-3 text-start">
                    <label for="username" class="form-label fw-medium text-secondary">Usuário</label>
                    <input type="text" class="form-control" id="username" name="username" required placeholder="Digite seu usuário">
                </div>

                <div class="mb-4 text-start">
                    <label for="password" class="form-label fw-medium text-secondary">Senha</label>
                    <input type="password" class="form-control" id="password" name="password" required placeholder="Digite sua senha">
                </div>

                <div class="text-center">
                    <button type="submit" class="btn btn-primary px-5 py-2 fw-bold" style="border-radius: 8px;">Entrar</button>
                </div>

            </form>
        </div>
    </div>

</body>
</html>
