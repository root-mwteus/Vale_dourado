<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sistema de Laticínios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary shadow-sm mb-4">
        <div class="container-fluid px-4">
            <span class="navbar-brand mb-0 h1 fw-bold">ORDENS DE SERVIÇO</span>
            
            <form action="/logout" method="POST" class="m-0">
                <button type="submit" class="btn btn-outline-light btn-sm fw-bold px-3">Sair do Sistema</button>
            </form>

        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                
                <div class="card shadow-sm border-0 p-4 mb-4" style="border-radius: 12px;">
                    <h2 class="text-secondary fw-semibold mb-2">
                        Olá, <span class="text-primary fw-bold">{{ session['usuario'] }}</span>!
                    </h2>
                    <p class="text-muted mb-0">Bem-vindo de volta.</p>
                </div>

                <div class="card shadow-sm border-0 p-5 text-center text-muted" style="border-radius: 12px; border: 2px dashed #dee2e6 !important;">
                    <h3 class="h5 mb-2">⚙️ Painel de Ordens de Serviço</h3>
                    <p class="small mb-0">dados</p>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
